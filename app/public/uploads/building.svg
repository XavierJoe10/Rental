<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="normal" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="white" />

  <g transform="translate(150,150) scale(0.8)">
    <g filter="url(#soft)" opacity="0.95">
      <rect x="60" y="220" width="220" height="680" rx="12" fill="url(#g1)" />
      <rect x="320" y="140" width="220" height="760" rx="12" fill="#0ea5e9" opacity="0.95" />
      <rect x="580" y="280" width="220" height="620" rx="12" fill="#1e40af" opacity="0.95" />

      <!-- windows pattern -->
      <g fill="rgba(255,255,255,0.9)">
        <!-- first tower windows -->
        <g transform="translate(90,260)">
          <rect x="0" y="0" width="40" height="20" rx="3" />
          <rect x="0" y="40" width="40" height="20" rx="3" />
          <rect x="0" y="80" width="40" height="20" rx="3" />
        </g>
        <!-- repeat across tower -->
        <g transform="translate(160,260)">
          <rect x="0" y="0" width="40" height="20" rx="3" />
          <rect x="0" y="40" width="40" height="20" rx="3" />
          <rect x="0" y="80" width="40" height="20" rx="3" />
        </g>
        <!-- second tower windows -->
        <g transform="translate(350,180)">
          <rect x="0" y="0" width="36" height="18" rx="3" />
          <rect x="0" y="36" width="36" height="18" rx="3" />
          <rect x="0" y="72" width="36" height="18" rx="3" />
        </g>
        <g transform="translate(410,180)">
          <rect x="0" y="0" width="36" height="18" rx="3" />
          <rect x="0" y="36" width="36" height="18" rx="3" />
          <rect x="0" y="72" width="36" height="18" rx="3" />
        </g>
        <!-- third tower windows -->
        <g transform="translate(610,320)">
          <rect x="0" y="0" width="38" height="19" rx="3" />
          <rect x="0" y="42" width="38" height="19" rx="3" />
        </g>
      </g>

      <!-- swoosh / circuit-like accents -->
      <path d="M20 920 C 220 760, 540 740, 980 860" stroke="#7dd3fc" stroke-width="18" fill="none" opacity="0.18" stroke-linecap="round" />
      <path d="M40 980 C 300 820, 620 800, 1120 880" stroke="#60a5fa" stroke-width="12" fill="none" opacity="0.12" stroke-linecap="round" />
    </g>
  </g>
</svg>
